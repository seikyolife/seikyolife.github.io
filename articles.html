<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>記事一覧｜生協のあるくらし</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green-dark:#085041; --green-mid:#0F6E56; --green:#1D9E75;
    --green-light:#5DCAA5; --green-pale:#E1F5EE;
    --amber-pale:#FAEEDA; --blue-pale:#E6F1FB; --blue:#185FA5;
    --text:#1a1a18; --text-muted:#5a5a56; --border:rgba(8,80,65,0.12);
    --bg:#fafaf8; --white:#ffffff;
    --serif:'Noto Serif JP',serif; --sans:'Noto Sans JP',sans-serif;
    --radius:12px; --radius-lg:18px; --max-w:900px;
  }
  html { font-size:16px; scroll-behavior:smooth; }
  body { font-family:var(--sans); background:var(--bg); color:var(--text); line-height:1.75; -webkit-font-smoothing:antialiased; }
  header { position:sticky; top:0; z-index:100; background:rgba(250,250,248,0.92); backdrop-filter:blur(8px); border-bottom:1px solid var(--border); }
  .nav-inner { max-width:var(--max-w); margin:0 auto; padding:0 1.5rem; display:flex; align-items:center; justify-content:space-between; height:60px; }
  .logo { font-family:var(--serif); font-size:17px; font-weight:700; color:var(--green-dark); text-decoration:none; }
  .logo span { color:var(--green); }
  nav { display:flex; gap:1.75rem; }
  nav a { font-size:13px; font-weight:500; color:var(--text-muted); text-decoration:none; transition:color 0.15s; }
  nav a:hover, nav a.active { color:var(--green-dark); }
  .page-header { max-width:var(--max-w); margin:0 auto; padding:2.5rem 1.5rem 0; }
  .page-header h1 { font-family:var(--serif); font-size:26px; font-weight:700; margin-bottom:0.5rem; }
  .page-header p { font-size:14px; color:var(--text-muted); }
  .filter-bar { max-width:var(--max-w); margin:1.5rem auto 0; padding:0 1.5rem; display:flex; gap:8px; flex-wrap:wrap; }
  .filter-btn { font-size:12px; padding:5px 14px; border-radius:99px; border:1px solid var(--border); color:var(--text-muted); background:none; cursor:pointer; font-family:var(--sans); transition:all 0.15s; }
  .filter-btn.active { background:var(--green-dark); color:#fff; border-color:var(--green-dark); }
  .page-wrap { max-width:var(--max-w); margin:0 auto; padding:2rem 1.5rem 4rem; display:grid; grid-template-columns:1fr 260px; gap:2.5rem; align-items:start; }
  .section-label { display:flex; align-items:center; gap:10px; font-size:11px; font-weight:500; letter-spacing:0.08em; color:var(--green-mid); margin-bottom:1.25rem; }
  .section-label::after { content:''; flex:1; height:1px; background:var(--border); }
  .articles { display:flex; flex-direction:column; gap:1rem; }
  .article-card { display:block; background:var(--white); border:1px solid var(--border); border-radius:var(--radius-lg); padding:1.5rem; text-decoration:none; color:inherit; transition:border-color 0.2s, box-shadow 0.2s, transform 0.2s; }
  .article-card:hover { border-color:var(--green-light); box-shadow:0 4px 20px rgba(8,80,65,0.08); transform:translateY(-2px); }
  .card-meta { display:flex; align-items:center; gap:8px; margin-bottom:0.75rem; }
  .tag { font-size:11px; font-weight:500; color:var(--green-mid); background:var(--green-pale); padding:3px 10px; border-radius:99px; }
  .date { font-size:11px; color:var(--text-muted); }
  .card-title { font-family:var(--serif); font-size:17px; font-weight:700; color:var(--text); line-height:1.5; margin-bottom:0.5rem; }
  .card-desc { font-size:13px; color:var(--text-muted); line-height:1.7; margin-bottom:1rem; }
  .card-badges { display:flex; gap:6px; }
  .badge { font-size:11px; font-weight:500; padding:3px 10px; border-radius:99px; }
  .badge-pal { background:var(--blue-pale); color:var(--blue); }
  .badge-sei { background:var(--amber-pale); color:#854F0B; }
  .card-arrow { display:flex; align-items:center; gap:4px; font-size:12px; color:var(--green); margin-top:1rem; font-weight:500; }
  .card-arrow svg { transition:transform 0.2s; }
  .article-card:hover .card-arrow svg { transform:translateX(4px); }
  .sidebar { display:flex; flex-direction:column; gap:1.25rem; }
  .sidebar-card { background:var(--white); border:1px solid var(--border); border-radius:var(--radius-lg); padding:1.25rem; }
  .profile-head { display:flex; align-items:center; gap:12px; margin-bottom:0.75rem; }
  .profile-name { font-weight:500; font-size:14px; margin-bottom:1px; }
  .profile-role { font-size:12px; color:var(--text-muted); }
  .profile-bio { font-size:13px; color:var(--text-muted); line-height:1.75; }
  .cat-list { list-style:none; display:flex; flex-direction:column; gap:2px; }
  .cat-list li a { display:flex; align-items:center; justify-content:space-between; font-size:13px; color:var(--text-muted); text-decoration:none; padding:7px 10px; border-radius:8px; transition:background 0.15s, color 0.15s; }
  .cat-list li a:hover { background:var(--green-pale); color:var(--green-dark); }
  .cat-count { font-size:11px; font-weight:500; color:var(--green-mid); background:var(--green-pale); padding:2px 8px; border-radius:99px; }
  .tag-cloud { display:flex; flex-wrap:wrap; gap:6px; }
  .tag-cloud a { font-size:12px; color:var(--text-muted); border:1px solid var(--border); padding:4px 12px; border-radius:99px; text-decoration:none; transition:all 0.15s; }
  .tag-cloud a:hover { border-color:var(--green); color:var(--green-dark); background:var(--green-pale); }
  footer { border-top:1px solid var(--border); background:var(--white); }
  .footer-inner { max-width:var(--max-w); margin:0 auto; padding:2rem 1.5rem; display:flex; align-items:center; justify-content:space-between; }
  .footer-logo { font-family:var(--serif); font-size:15px; font-weight:700; color:var(--green-dark); }
  .footer-logo span { color:var(--green); }
  .footer-copy { font-size:12px; color:var(--text-muted); }
  @media(max-width:660px){ .page-wrap{grid-template-columns:1fr} nav{gap:1rem} .footer-inner{flex-direction:column;gap:.5rem;text-align:center} }
</style>
</head>
<body>

<header id="site-header"></header>

<div class="page-header">
  <h1>記事一覧</h1>
  <p>全記事をまとめて読めます</p>
</div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="filterArticles('all', this)">すべて</button>
  <button class="filter-btn" onclick="filterArticles('review', this)">食べ物レビュー</button>
  <button class="filter-btn" onclick="filterArticles('hitorigoto', this)">管理者のひとりごと</button>
</div>

<div class="page-wrap">
  <main>
    <div class="section-label" id="article-count"></div>
    <div class="articles" id="article-list"></div>
  </main>
  <aside class="sidebar" id="site-sidebar"></aside>
</div>

<footer id="site-footer"></footer>

<script src="common.js"></script>
<script>
  renderNav("articles.html");
  renderSidebar();
  renderFooter();

  function filterArticles(cat, btn) {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const filtered = cat === "all" ? ARTICLES : ARTICLES.filter(a => a.category === cat);
    const list = document.getElementById("article-list");
    document.getElementById("article-count").textContent = `全 ${filtered.length} 件`;
    list.innerHTML = "";
    filtered.forEach(a => list.insertAdjacentHTML("beforeend", articleCardHtml(a)));
  }

  filterArticles("all", document.querySelector(".filter-btn.active"));
</script>
</body>
</html>
